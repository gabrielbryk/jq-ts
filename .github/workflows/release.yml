name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Mint a GitHub App installation token. Using an App identity (not the
      # default GITHUB_TOKEN) lets the "chore: release package" PR trigger the
      # CI / Changeset workflows — GitHub suppresses workflow runs for events
      # created by GITHUB_TOKEN, which otherwise leaves the release PR with no
      # (required) checks and unmergeable.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # prepublishOnly runs the full CI gate, including the differential suite
      # against jq — pin the same version ci.yml uses so publish doesn't run
      # against the runner's older stock jq.
      - name: Install jq 1.8.1
        run: |
          curl -fsSL -o jq https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64
          chmod +x jq
          sudo mv jq /usr/local/bin/jq
          jq --version

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          commit: 'chore: release package'
          title: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
